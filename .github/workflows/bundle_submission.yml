name: Process Bundle Submission

on:
  issues:
    types: [labeled]

jobs:
  process-submission:
    # Only run if the issue title implies a submission AND the label is 'approved' (case-insensitive check)
    if: contains(github.event.issue.title, 'Bundle') && contains(github.event.label.name, 'approve')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Process Issue Body
        id: process
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          cat << 'EOF' > process.js
          const fs = require('fs');
          const issueBody = process.env.ISSUE_BODY;
          
          try {
            let jsonStr = "";
            
            // Look for JSON block
            const jsonMatch = issueBody.match(/```json([\s\S]*?)```/);
            const genericMatch = issueBody.match(/```([\s\S]*?)```/);
            
            if (jsonMatch) {
                jsonStr = jsonMatch[1].trim();
            } else if (genericMatch) {
                jsonStr = genericMatch[1].trim();
            } else {
                const startObj = issueBody.indexOf('{');
                const endObj = issueBody.lastIndexOf('}');
                const startArr = issueBody.indexOf('[');
                const endArr = issueBody.lastIndexOf(']');
                
                if (startArr !== -1 && endArr !== -1 && (startObj === -1 || startArr < startObj)) {
                    jsonStr = issueBody.substring(startArr, endArr + 1).trim();
                } else if (startObj !== -1 && endObj !== -1) {
                    jsonStr = issueBody.substring(startObj, endObj + 1).trim();
                }
            }

            if (!jsonStr) throw new Error("No JSON code block found in issue body.");
            
            let newBundles = JSON.parse(jsonStr);
            if (!Array.isArray(newBundles)) {
                newBundles = [newBundles]; // Support single object submission
            }
            
            console.log(`Found ${newBundles.length} new bundles.`);
            
            // Read config.json
            let config = {};
            try {
                config = JSON.parse(fs.readFileSync('config.json', 'utf8'));
            } catch (e) {
                console.log("config.json not found, initializing...");
                config = { storefrontModules: [] };
            }

            if (!config.storefrontModules) {
                config.storefrontModules = [];
            }

            let bundleModule = config.storefrontModules.find(m => m.type === 'recommendation_bundles');
            if (!bundleModule) {
                bundleModule = {
                    id: 'community_bundles',
                    type: 'recommendation_bundles',
                    title: 'Community Bundles',
                    subtitle: 'Curated by the community',
                    bundles: []
                };
                config.storefrontModules.push(bundleModule);
            }

            if (!bundleModule.bundles) {
                bundleModule.bundles = [];
            }

            let addedCount = 0;
            let addedTitles = [];
            
            newBundles.forEach(bundle => {
               const exists = bundleModule.bundles.some(b => b.id === bundle.id);
               
               if (!exists && bundle.id && bundle.title && Array.isArray(bundle.appIds)) {
                   bundleModule.bundles.push({
                       id: bundle.id,
                       title: bundle.title,
                       description: bundle.description || "",
                       appIds: bundle.appIds,
                       icon: bundle.icon || "fa-box-open",
                       color: bundle.color || "blue"
                   });
                   addedCount++;
                   addedTitles.push(bundle.title);
               }
            });
            
            if (addedCount > 0) {
               fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
               console.log(`Successfully added ${addedCount} bundles.`);
               fs.writeFileSync('added_bundles.txt', addedTitles.join(', '));
            } else {
               console.log("No new unique valid bundles found.");
               fs.writeFileSync('added_bundles.txt', '');
            }
            
          } catch (e) {
            console.error("Error processing:", e.message);
            process.exit(1);
          }
          EOF
          
          node process.js

      - name: Commit & Push Changes
        run: |
          git config --global user.name "Orion Bot"
          git config --global user.email "bot@orion.store"
          
          if git diff --quiet config.json || [ ! -f config.json ]; then
            echo "No changes to commit."
          else
            git add config.json
            git commit -m "feat: Add approved bundles from Issue #${{ github.event.issue.number }}"
            git push
          fi

      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s added_bundles.txt ]; then
            gh issue close ${{ github.event.issue.number }} --comment "✅ Submission Approved! The bundles have been added to the store."
          fi

      - name: Notify Discord of Success
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        with:
          script: |
            const fs = require('fs');
            const webhookUrl = process.env.DISCORD_WEBHOOK;
            if (!webhookUrl) return;
            let addedBundles = "";
            try { addedBundles = fs.readFileSync('added_bundles.txt', 'utf8'); } catch(e) {}
            if (!addedBundles) return;
            const payload = {
              username: "Orion Store Bot",
              avatar_url: "https://raw.githubusercontent.com/RookieEnough/Orion-Data/main/assets/orion_logo_512.png",
              embeds: [{
                  title: `✅ Bundles Successfully Added`,
                  description: `The following bundles are now live in the store:\n**${addedBundles}**`,
                  color: 5763719,
                  url: process.env.ISSUE_URL,
                  footer: { text: "Orion Store Automation" },
                  timestamp: new Date().toISOString()
              }]
            };
            await fetch(webhookUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
